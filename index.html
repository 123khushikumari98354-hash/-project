 <!DOCTYPE html>
<html>
<head>
  <title>Ultimate E-Commerce</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      transition: 0.3s;
    }

    .dark {
      background: #121212;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 10px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    nav button {
      padding: 10px 20px;
      border: none;
      background: #ff6b6b;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    nav button:hover {
      transform: scale(1.1);
    }

    #products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      position: relative;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: red;
      color: white;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    .wishlist {
      position: absolute;
      top: 10px;
      right: 10px;
      cursor: pointer;
      font-size: 18px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      padding: 8px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      margin-top: 5px;
      cursor: pointer;
    }

    .cart-badge {
      background: black;
      color: white;
      padding: 2px 8px;
      border-radius: 50%;
      font-size: 12px;
    }

    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 5px;
      display: none;
    }
  </style>
</head>

<body>

<h1>🛒 Ultimate Store</h1>

<nav>
  <button onclick="showHome()">Home</button>
  <button onclick="showCart()">Cart <span id="cartCount" class="cart-badge">0</span></button>
  <button onclick="toggleDark()">🌙</button>
</nav>

<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id:1, name:"Laptop", price:50000, img:"https://via.placeholder.com/200", badge:"SALE" },
  { id:2, name:"Phone", price:20000, img:"https://via.placeholder.com/200", badge:"NEW" },
  { id:3, name:"Shoes", price:3000, img:"https://via.placeholder.com/200" },
  { id:4, name:"Watch", price:5000, img:"https://via.placeholder.com/200" }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = [];

function updateCartCount(){
  document.getElementById("cartCount").innerText = cart.length;
}

function toast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function showHome(){
  let html = "<div id='products'>";
  products.forEach(p=>{
    html += `
      <div class="card">
        ${p.badge ? `<div class="badge">${p.badge}</div>` : ""}
        <div class="wishlist" onclick="addWishlist(${p.id})">❤️</div>
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="add(${p.id})">Add to Cart</button>
        <button onclick="view(${p.id})">View</button>
      </div>
    `;
  });
  html += "</div>";
  document.getElementById("app").innerHTML = html;
}

function add(id){
  let p = products.find(x=>x.id===id);
  cart.push(p);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  toast("Added to cart");
}

function showCart(){
  let total=0, html="<h2>Cart</h2>";
  cart.forEach((item,i)=>{
    total+=item.price;
    html+=`
      <div class="card">
        <p>${item.name} - ₹${item.price}</p>
        <button onclick="removeItem(${i})">Remove</button>
      </div>
    `;
  });
  html+=`<h3>Total: ₹${total}</h3>`;
  html+=`<button onclick="order()">Place Order</button>`;
  document.getElementById("app").innerHTML = html;
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  showCart();
}

function order(){
  alert("Order Placed 🎉");
  cart=[];
  localStorage.setItem("cart","[]");
  updateCartCount();
  showHome();
}

function view(id){
  let p = products.find(x=>x.id===id);
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalContent").innerHTML=`
    <h3>${p.name}</h3>
    <img src="${p.img}">
    <p>₹${p.price}</p>
    <button onclick="add(${p.id})">Add</button>
    <button onclick="closeModal()">Close</button>
  `;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function addWishlist(id){
  toast("Added to wishlist ❤️");
}

updateCartCount();
showHome();
</script>

</body>
</html>
